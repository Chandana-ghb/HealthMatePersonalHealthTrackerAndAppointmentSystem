<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>HealthMate Patient Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
   <link rel="icon" href="./Assets/HealthMate_Logo.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    Main Nav bar header.sticky {
      position: sticky;
      top: 0;
      z-index: 1000;
      background-color: #ffffff;
      border-bottom: 1px solid #ccc;
      padding: 10px 20px;

    }

    .con {
      display: flex;
      justify-content: space-between;
    }

    .nav {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 50%;
      gap: 20px;
      flex-wrap: wrap;
    }

    .item a {
      text-decoration: none;
      color: black;
      font-size: 20px;
      position: relative;
    }

    .item a:hover {
      color: #5409DA;
      border-radius: 5px;
    }

    .item a::after {
      content: '';
      height: 2px;
      width: 100%;
      background: #5409DA;
      position: absolute;
      left: 0;
      top: 30px;
      opacity: 0;
    }

    .item a:hover::after {
      opacity: 1;
    }

    .con_createbtn {
      margin-top: 20px;
      transition: 0.4s;
      font-family: "Cardo", serif;
    }

    .con_createbtn:hover {
      transition: 0.4s;
      transform: scale(1.08);
    }


    .logo {
      margin-top: 7px;
    }


    .menu {
      display: none;
      cursor: pointer;
      font-size: 30px;
      color: black;
      padding: 0px 10px 0px 10px;
      margin-top: 10px;
      text-align: center;
      border-radius: 10px;

    }


    .menu::before {
      content: "☰";
    }

    #menu-toggle {
      display: none;
    }

    #menu-toggle:checked+.menu::before {
      content: "✖";
    }

    #menu-toggle:checked~.item {
      display: flex;
      flex-direction: column;
      width: 100%;
    }

    /* Responsiveness */

    @media (max-width: 426px) {
      .item {
        display: none;
        flex-direction: column;
      }

      .item a {
        text-decoration: none;
        color: black;
        font-size: 14px;
        position: relative;
        text-align: center;
      }

      .logo {
        margin-top: 20px;
      }

      .menu {
        display: block;
        text-align: center;
      }

      .item>a {
        border: none;
        border-top: 1px solid #fff;
      }

      .con_createbtn {
        width: 100px;
        font-size: 11px;
        margin-top: 40px;
      }

    }

    @media (width: 768px) {
      .item a {
        text-decoration: none;
        color: black;
        font-size: 17px;
        position: relative;
      }
    }

    /* Profile */


    .layout {
      display: flex;
      min-height: calc(98vh - 80px);
      background-color: #f0f2f5;

    }

    .sidebar {
      width: 250px;
      background: linear-gradient(180deg, #5409DA, #3c9ac9);
      color: white;
      display: flex;
      flex-direction: column;
      padding: 30px 20px;
      border-top-right-radius: 15px;
      border-bottom-right-radius: 15px;
      box-shadow: 2px 0 10px rgba(0, 0, 0, 0.1);
    }

    .sidebar h2 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 40px;
      font-family: 'Cardo', serif;
      text-align: center;
    }

    .sidebar a {
      color: white;
      text-decoration: none;
      font-size: 18px;
      padding: 12px 20px;
      margin-bottom: 10px;
      border-radius: 8px;
      transition: background 0.3s ease, transform 0.2s ease;
      font-family: 'Karma', sans-serif;
    }

    .sidebar a:hover {
      background: rgba(255, 255, 255, 0.15);
      transform: translateX(5px);
    }

    .logout-button {
      margin-top: auto;
      padding: 12px;
      background-color: #e63946;
      border: none;
      color: white;
      font-weight: bold;
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.3s ease;
    }

    .logout-button:hover {
      background-color: #c43038;
    }

    .content {
      flex-grow: 1;
      padding: 40px;
      background-color: #f9fbfd;
      position: relative;
      overflow-y: auto;
    }


    .profile-info {
      background: white;
      padding: 20px;
      border-radius: 8px;
      max-width: 450px;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
      margin-top: 150px;
      margin-left: 350px;
    }

    /* Responsive adjustments for small devices */
    @media (max-width: 768px) {
      .profile-info {
        padding: 20px;
        width: 95%;
        max-width: 400px;
      }
    }

    @media (max-width: 480px) {
      .profile-info {
        padding: 15px;
        width: 95%;
        max-width: 350px;
      }

      .profile-info h3 {
        font-size: 20px;
      }

      .profile-item {
        font-size: 14px;
      }
    }


    .profile-item {
      margin-bottom: 15px;
      font-size: 16px;
      color: #333;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Tablet and below */
    @media (max-width: 768px) {
      .layout {
        flex-direction: column;
      }

      .sidebar {
        width: 100%;
        border-radius: 0;
        flex-direction: row;
        justify-content: space-around;
        padding: 15px;
      }

      .sidebar a {
        padding: 10px;
        font-size: 16px;
      }

      .logout-button {
        margin-top: 10px;
        width: 100%;
      }

      .content {
        padding: 20px;
      }

      .profile-info {
        padding: 20px;
        margin: 60px auto 0;
      }
    }

    /* Small devices (phones) */
    @media screen and (max-width: 576px) {
      .nav {
        flex-direction: column;
        gap: 10px;
      }

      .profile-info {
        padding: 20px;
        font-size: 14px;
      }

      .sidebar {
        padding: 10px;
        flex-direction: column;
        align-items: center;
      }

      .sidebar a {
        font-size: 14px;
        padding: 8px 10px;
        width: 100%;
        text-align: center;
      }

      .logout-button {
        font-size: 14px;
        width: 100%;
      }

      .content {
        padding: 10px;
      }

      .con_createbtn {
        width: 100px;
        font-size: 11px;
        margin-top: 10px;
      }
    }

<body>

  <!-- Main Nav Bar -->
  <header class="sticky">
    <div class="container-fluid con">
      <div class="logo"><img src="./Assets/HealthMate_Logo.png" width="65px" alt="logo"></div>

      <div class="nav">
        <input type="checkbox" id="menu-toggle" />
        <label for="menu-toggle" class="menu"></label>
        <div class=".nav-1 item"><a href="./index.html">HOME</a></div>
        <div class="nav-2 item"><a href="./all_doctors.html">ALLDOCTORS</a></div>
        <div class="nav-3 item"><a href="./about.html">ABOUT</a></div>
        <div class="nav-4 item"><a href="./contact.html">CONTACT</a></div>
      </div>
      <!-- Profile Dropdown with Name -->
      <!-- Profile Dropdown -->
      <div class="dropdown d-flex align-items-center gap-2">
        <span id="doctorName" class="fw-bold text-dark"></span>
        <button class="btn btn-outline-secondary dropdown-toggle" type="button" id="profileDropdown"
          data-bs-toggle="dropdown" aria-expanded="false">
          <img id="profileImage" src="https://cdn-icons-png.flaticon.com/512/847/847969.png" width="30" height="30"
            class="rounded-circle" alt="Profile" />
        </button>
        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="profileDropdown">
          <li><a class="dropdown-item" href="#" id="dropdownProfile">Profile</a></li>
          <li>
            <label class="dropdown-item" for="uploadProfileImage" style="cursor: pointer;">Change Picture</label>
            <input type="file" id="uploadProfileImage" accept="image/*" style="display: none;" />
          </li>
          <li><a class="dropdown-item text-danger" href="#" id="deleteProfileImage">Delete Picture</a></li>
          <li><a class="dropdown-item" href="#" id="dropdownLogout">Logout</a></li>
        </ul>
      </div>
    </div>
  </header>

  <!-- Sidebar + Content -->
  <div class="layout">
    <div class="sidebar">
      <h2>Patient Panel</h2>
      <a id="navDashboard">Dashboard</a>
      <a id="navProfile">Profile</a>
      <a id="navAppointment">Appointment</a>
      <a id="navPrescription">Prescription</a>
      <button class="logout-button" id="logoutBtn">Logout</button>
    </div>

    <div class="content">
      <div id="dashboardContent">
        <!-- Initial content -->
        <h3>Dashboard</h3>
        <p>Welcome to HealthMate! Use the sidebar to navigate.</p>
      </div>
    </div>
  </div>

  <script>

    // patient_dashboard.js

    const dashboardContent = document.getElementById('dashboardContent');
    const logoutBtn = document.getElementById('logoutBtn');
    const userId = localStorage.getItem('userId');

    if (!userId) {
      alert('User not logged in. Redirecting to login page.');
      window.location.href = 'create_account.html';
    }

    async function fetchUserProfile(id) {
      try {
        const response = await fetch(`http://localhost:8093/user/getuses/${id}`);
        if (!response.ok) throw new Error('Failed to fetch user data');
        return await response.json();
      } catch (error) {
        console.error(error);
        alert('Error fetching user profile. Please login again.');
        localStorage.removeItem('userId');
        window.location.href = 'create_account.html';
      }
    }

    function displayUserProfile(user) {
      dashboardContent.innerHTML = `
    <div class="profile-info">
      <h3>Welcome, ${user.name}!</h3>
      <div class="profile-item"><strong>Email:</strong> ${user.email}</div>
      <div class="profile-item"><strong>Role:</strong> ${user.role}</div>
      <div class="profile-item"><strong>User ID:</strong> ${user.id}</div>
    </div>
  `;
    }

    document.getElementById('navDashboard').addEventListener('click', () => {
      dashboardContent.innerHTML = `
    <h3 class="dheading">Log Your Health Data</h3>
    <form id="healthForm" class="p-4 bg-white rounded shadow-sm" style="max-width:500px">
      <div class="mb-3">
        <label for="date" class="form-label">Date</label>
        <input type="date" class="form-control" id="date" required>
      </div>
      <div class="mb-3">
        <label for="weight" class="form-label">Weight (kg)</label>
        <input type="number" class="form-control" id="weight" required>
      </div>
      <div class="mb-3">
        <label for="calories" class="form-label">Calories</label>
        <input type="number" class="form-control" id="calories" required>
      </div>
      <div class="mb-3">
        <label for="steps" class="form-label">Steps</label>
        <input type="number" class="form-control" id="steps" required>
      </div>
      <button type="submit" class="btn btn-primary">Submit</button>
    </form>
    <div id="healthResponseMsg" class="mt-3 text-success"></div>
  `;

      document.getElementById('healthForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const date = document.getElementById('date').value;
        const weight = document.getElementById('weight').value;
        const calories = document.getElementById('calories').value;
        const steps = document.getElementById('steps').value;

        const healthData = { date, weight, calories, steps };

        try {
          const response = await fetch(`http://localhost:8093/healthdata/add/${userId}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(healthData)
          });

          if (response.ok) {
            document.getElementById('healthResponseMsg').innerText = 'Health data saved successfully!';
            document.getElementById('healthForm').reset();
            alert('Health data submitted successfully!');
          } else {
            throw new Error('Failed to save health data');
          }
        } catch (error) {
          document.getElementById('healthResponseMsg').innerText = 'Error: ' + error.message;
          document.getElementById('healthResponseMsg').classList.replace('text-success', 'text-danger');
        }
      });
    });

    document.getElementById('navProfile').addEventListener('click', async () => {
      const user = await fetchUserProfile(userId);
      if (user) displayUserProfile(user);
    });

    document.getElementById('navAppointment').addEventListener('click', async () => {
      dashboardContent.innerHTML = '<h3>Your Appointments</h3><div id="appointmentsList"></div>';

      const patientId = localStorage.getItem("userId");

      try {
        const response = await fetch(`http://localhost:8093/appointments/patient/${patientId}`);
        const appointments = await response.json();

        const listContainer = document.getElementById('appointmentsList');

        if (appointments.length === 0) {
          listContainer.innerHTML = '<p>No appointments found.</p>';
          return;
        }

        appointments.forEach(appt => {
          const item = document.createElement('div');
          item.className = 'appointment-item';
          item.innerHTML = `
        <div><strong>Doctor:</strong> ${appt.doctor.name}</div>
        <div><strong>Speciality:</strong> ${appt.doctor.speciality}</div>
        <div><strong>Date & Time:</strong> ${appt.dateTime.replace('T', ' ')}</div>
        <div><strong>Status:</strong> <span class="${appt.status === 'CONFIRMED' ? 'text-success' : appt.status === 'REJECTED' ? 'text-danger' : 'text-warning'}">${appt.status}</span></div>
        <hr>`;
          listContainer.appendChild(item);
        });
      } catch (err) {
        console.error(err);
        document.getElementById('appointmentsList').innerHTML = '<p>Error loading appointments</p>';
      }
    });

    document.getElementById('navPrescription').addEventListener('click', async () => {
      const dashboardContent = document.getElementById('dashboardContent');
      dashboardContent.innerHTML = '<h3>Your Prescriptions</h3><p>Loading...</p>';

      const patientId = localStorage.getItem('userId'); // Must be stored at login

      if (!patientId) {
        dashboardContent.innerHTML = '<p style="color:red;">❌ Patient not logged in properly.</p>';
        return;
      }

      try {
        // Step 1: Fetch all appointments for the patient
        const appointmentResponse = await fetch(`http://localhost:8093/appointments/patient/${patientId}`);
        if (!appointmentResponse.ok) throw new Error("Failed to fetch appointments");

        const appointments = await appointmentResponse.json();
        let html = '<h3>Your Prescriptions</h3>';

        if (appointments.length === 0) {
          html += '<p>No appointments found.</p>';
        }

        // Step 2: For each appointment, fetch prescriptions
        for (const appointment of appointments) {
          const presRes = await fetch(`http://localhost:8093/prescriptions/appointment/${appointment.id}`);
          if (!presRes.ok) continue;

          const prescriptions = await presRes.json();

          if (prescriptions.length > 0) {
            prescriptions.forEach(prescription => {
              html += `
            <div style="border:1px solid #ccc; border-radius:8px; padding:10px; margin-bottom:10px;">
              <h4>🧑‍⚕️ Doctor: ${appointment.doctor.name}</h4>
              <p><strong>Date:</strong> ${new Date(appointment.dateTime).toLocaleString()}</p>
              <p><strong>Notes:</strong> ${prescription.notes}</p>
              <p><a href="${prescription.documentUrl}" target="_blank">📄 View Document</a></p>
            </div>
          `;
            });
          }
        }

        dashboardContent.innerHTML = html;

      } catch (err) {
        console.error("Error fetching prescriptions:", err);
        dashboardContent.innerHTML = '<p style="color:red;">❌ Error loading prescriptions.</p>';
      }
    });


    logoutBtn.addEventListener('click', () => {
      localStorage.removeItem('userId');
      alert('Logged out successfully');
      window.location.href = 'create_account.html';
    });

    document.getElementById('navDashboard').click();

    fetchUserProfile(userId).then(user => {
      if (user && user.name) {
        document.getElementById('doctorName').innerText = `${user.name}`;
      }
    });

    document.getElementById('dropdownProfile').addEventListener('click', async (e) => {
      e.preventDefault();
      document.getElementById('navProfile').click();
    });

    document.getElementById('dropdownLogout').addEventListener('click', () => {
      logoutBtn.click();
    });


    const profileImg = document.getElementById('profileImage');
    const uploadInput = document.getElementById('uploadProfileImage');
    const deleteBtn = document.getElementById('deleteProfileImage');

    // ✅ 1. Load saved profile image from localStorage
    window.addEventListener('DOMContentLoaded', () => {
      const savedImage = localStorage.getItem('profileImage');
      if (savedImage) {
        profileImg.src = savedImage;
      }
    });

    // ✅ 2. Handle image upload
    uploadInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = function (e) {
        const imageUrl = e.target.result;

        // Preview and store in localStorage
        profileImg.src = imageUrl;
        localStorage.setItem('profileImage', imageUrl);
      };
      reader.readAsDataURL(file);
    });

    // ✅ 3. Handle delete image
    deleteBtn.addEventListener('click', () => {
      localStorage.removeItem('profileImage');
      profileImg.src = "https://cdn-icons-png.flaticon.com/512/847/847969.png"; // default
      alert("Profile image deleted.");
    });

  </script>

</body>

</html>
